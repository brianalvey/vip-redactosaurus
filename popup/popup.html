<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIP Redactosaurus</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      font-size: 13px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 16px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .header .dino { font-size: 22px; }

    .header .title {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
    }

    .header .subtitle {
      font-size: 11px;
      color: #888;
      margin-top: 1px;
    }

    .section {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .section:last-of-type { border-bottom: none; }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .row + .row { margin-top: 10px; }

    .row-label {
      font-size: 13px;
      color: #ccc;
    }

    .toggle {
      width: 40px;
      height: 22px;
      background: #333;
      border-radius: 11px;
      cursor: pointer;
      position: relative;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    .toggle.active { background: #4caf50; }

    .toggle::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 18px;
      height: 18px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle.active::after { transform: translateX(18px); }

    .field { margin-top: 10px; }

    .field label {
      display: block;
      font-size: 11px;
      color: #888;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .field input, .field select {
      width: 100%;
      background: #16162a;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 7px 10px;
      color: #e0e0e0;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    .field input:focus, .field select:focus {
      border-color: #4caf50;
    }

    .field input::placeholder { color: #555; }

    .status-bar {
      padding: 8px 16px;
      text-align: center;
      font-size: 11px;
      color: #888;
    }

    .status-bar.active { color: #4caf50; }
    .status-bar.inactive { color: #f44336; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .processing { animation: pulse 1s infinite; }
  </style>
</head>
<body>
  <div class="header">
    <span class="dino">🦕</span>
    <div>
      <div class="title">Redactosaurus</div>
      <div class="subtitle">Content anonymization for demos</div>
    </div>
  </div>

  <div class="section">
    <div class="row">
      <span class="row-label">Anonymization</span>
      <div class="toggle" id="toggleSwitch"></div>
    </div>
    <div class="row">
      <span class="row-label">Keep screen awake</span>
      <div class="toggle" id="wakeLockSwitch"></div>
    </div>
  </div>

  <div class="section">
    <div class="field">
      <label>Publisher name</label>
      <input type="text" id="publisherName" placeholder="Demo Network">
    </div>
    <div class="field">
      <label>Publisher domain</label>
      <input type="text" id="publisherDomain" placeholder="demosite.test">
    </div>
  </div>

  <div class="section">
    <div class="field">
      <label>Headline mode</label>
      <select id="headlineModeSelect">
        <option value="replace">Replace with random headlines</option>
        <option value="scramble">Scramble existing headlines</option>
      </select>
    </div>
  </div>

  <div class="status-bar" id="status">Loading...</div>

  <script src="popup.js"></script>
</body>
</html>
